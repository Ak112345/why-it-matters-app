name: Process Pending Analysis

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Diagnostics
        run: |
          echo "=== BASIC ==="
          uname -a
          echo "=== DISK ==="
          df -h
          echo "=== MEMORY ==="
          free -h || true
          echo "=== FFMPEG ==="
          which ffmpeg || true
          ffmpeg -version || true
          echo "=== FILES HERE ==="
          ls -lah

      - name: Run worker script
        env:
          SUPABASE_URL: https://aiwijowbfdfcfivrmrao.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx ts-node scripts/process-pending-analysis