name: Process Pending Analysis

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  process-pending:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger pending analysis via API
        run: |
          echo "[$(date -u)] Triggering pending analysis processing..."
          curl -fsS --max-time 60 \
            "${{ secrets.VERCEL_PRODUCTION_URL }}/api/analyze?secret=${{ secrets.VERCEL_CRON_SECRET }}" \
            || echo "Analysis endpoint returned non-200 (may be no pending items)"