name: Daily Content Generation

on:
  schedule:
    # Run 3x daily: 6 AM, 2 PM, 10 PM UTC (2-3 posts per day per platform)
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger content generation
        run: |
          set -e
          echo "[$(date -u)] Triggering content generation..."
          curl -fsS --max-time 300 \
            "${{ secrets.VERCEL_PRODUCTION_URL }}/api/content/generate?secret=${{ secrets.VERCEL_CRON_SECRET }}" \
            || echo "Content generation returned non-200 (may be queue full or no new clips)"

      - name: Trigger publish cron (post any due videos)
        run: |
          set -e
          echo "[$(date -u)] Triggering publish cron..."
          curl -fsS --max-time 60 \
            "${{ secrets.VERCEL_PRODUCTION_URL }}/api/publish/cron?secret=${{ secrets.VERCEL_CRON_SECRET }}" \
            || echo "Publish cron returned non-200 (may be no pending posts)"